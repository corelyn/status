<!DOCTYPE html>
<html>
<head>
    <title>Corelyn AI Status</title>

    <style>
        html, body {
            height: 100%;
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, rgb(214, 214, 214), rgb(247, 25, 255), rgb(195, 0, 255));
        }

        .center {
            display: flex;
            justify-content: center;
            padding-top: 30px;
        }

        .cards {
            display: flex;
            justify-content: center;
            margin-top: 40px;
            gap: 20px;
        }

        .card {
            padding: 1.2rem 2rem;
            border-radius: 20px;
            border: 2px solid rgb(196, 0, 214);
            color: white;
            text-align: center;
            background: rgba(0,0,0,0.25);
            transition: 0.3s;
            min-width: 180px;
        }

        .card:hover {
            transform: scale(1.05);
        }

        .status-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }

        .dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: gray;
        }

        .online {
            background: #00ff88;
            box-shadow: 0 0 10px #00ff88;
        }

        .offline {
            background: #ff4d4d;
            box-shadow: 0 0 10px #ff4d4d;
        }

        .btn {
            margin-top: 30px;
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            background: white;
        }
    </style>
</head>

<body>

    <div class="center">
        <img src="https://github.com/corelyn/.github/raw/main/profile/nobglogo.png" width="150px">
    </div>

    <div class="cards">
        <div class="card">
            <h3>Corelyn API</h3>
            <div class="status-row">
                <div id="api-dot" class="dot"></div>
                <span id="api-text">Checking...</span>
            </div>
        </div>

        <div class="card">
            <h3>Corelyn Site</h3>
            <div class="status-row">
                <div id="site-dot" class="dot"></div>
                <span id="site-text">Checking...</span>
            </div>
        </div>
    </div>

    <div class="center">
        <button class="btn" onclick="updateStatus()">Check Again</button>
    </div>

<script>
function isOnline(site) {
    return fetch(site, { method: "HEAD" })
        .then(response => {
            return response.status === 200;
        })
        .catch(() => {
            return false;
        });
}

function setStatus(prefix, online) {
    const dot = document.getElementById(prefix + "-dot");
    const text = document.getElementById(prefix + "-text");

    dot.classList.remove("online", "offline");

    if (online) {
        dot.classList.add("online");
        text.textContent = "ONLINE";
    } else {
        dot.classList.add("offline");
        text.textContent = "OFFLINE";
    }
}

async function updateStatus() {
    setStatus("api", false);
    setStatus("site", false);

    const api = await isOnline("https://api.corelyn.ro/cron");
    const site = await isOnline("https://corelyn.ro");

    setStatus("api", api);
    setStatus("site", site);
}

updateStatus();
</script>

</body>
</html>
